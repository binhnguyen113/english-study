<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện phản xạ từ vựng Anh - Việt</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            min-height: 100vh;
            font: 16px/1.5 system-ui, Arial, sans-serif;
            color: #0f3d7a;
            background: #eaf3ff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px
        }

        .container {
            width: min(100%, 540px);
            background: #fff;
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 18px 40px rgba(15, 45, 100, .08);
            display: grid;
            gap: 14px
        }

        h1 {
            margin: 0;
            font-size: 1.35rem;
            text-align: center
        }

        #questionType {
            margin: 0;
            color: #4d698b;
            font-size: .95rem;
            font-weight: 600;
            text-align: center
        }

        .word-block {
            padding: 18px 16px;
            border-radius: 22px;
            background: #f7fbff;
            border: 1px solid rgba(15, 50, 100, .1);
            text-align: center
        }

        .word {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 700;
            word-break: break-word
        }

        #pronunciation {
            display: inline-flex;
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(15, 70, 140, .1);
            color: #1e4975;
            font-size: .92rem
        }

        .controls,
        .tts-actions {
            display: grid;
            gap: 12px
        }

        select,
        input[type=text],
        button#submitBtn,
        .tts-btn {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(15, 50, 100, .14);
            background: #fff;
            color: inherit;
            font: inherit
        }

        select {
            appearance: none;
            cursor: pointer
        }

        select:focus,
        input[type=text]:focus,
        button:focus,
        .tts-btn:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(15, 50, 100, .08)
        }

        input[type=text] {
            min-height: 52px
        }

        button#submitBtn {
            border: none;
            background: #0f3d7a;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 14px 28px rgba(15, 45, 100, .18)
        }

        .tts-actions {
            padding: 14px;
            background: #f4f8ff;
            border: 1px solid rgba(15, 50, 100, .08);
            border-radius: 20px
        }

        .tts-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #eef5ff;
            font-weight: 700;
            border: none;
            box-shadow: 0 10px 24px rgba(15, 45, 100, .08)
        }

        .tts-btn .icon {
            font-size: 1.1rem
        }

        label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: .95rem;
            cursor: pointer
        }

        input[type=checkbox] {
            width: 18px;
            height: 18px;
            accent-color: #0f3d7a
        }

        .audio-rate {
            display: grid;
            gap: 8px
        }

        #rateRange {
            width: 100%;
            accent-color: #0f3d7a
        }

        #rateValue {
            text-align: right;
            color: #0f3d7a;
            font-weight: 700
        }

        .result {
            min-height: 56px;
            padding: 14px 16px;
            border-radius: 18px;
            background: #f4f8ff;
            color: #0f3d7a;
            display: grid;
            place-items: center;
            text-align: center;
            font-size: .96rem;
            font-weight: 600
        }

        .correct {
            color: #1c7a34
        }

        .wrong {
            color: #bf3d45
        }

        #progress {
            text-align: center;
            color: #5d7c98;
            font-size: .9rem
        }

        @media(max-width:420px) {
            .container {
                padding: 16px
            }

            .word {
                font-size: 1.7rem
            }

            .tts-actions {
                padding: 12px
            }

            #rateValue {
                text-align: left
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Luyện phản xạ từ vựng</h1>
        <p id="questionType">Dịch nghĩa của:</p>
        <div class="controls">
            <label for="modeSelect">Chế độ</label>
            <select id="modeSelect">
                <option value="EtoV">Tiếng Anh → Tiếng Việt</option>
                <option value="VtoE">Tiếng Việt → Tiếng Anh</option>
                <option value="Mixed">Xen lẫn (Random)</option>
            </select>
        </div>
        <div class="controls">
            <label for="topicSelect">Chủ đề</label>
            <select id="topicSelect"></select>
            <div id="topicInfo" style="font-size:.9rem; color:#4d698b;"></div>
        </div>
        <div class="word-row">
            <div class="word-block">
                <div class="word" id="wordDisplay"></div>
                <div id="pronunciation"></div>
            </div>
            <div class="tts-actions" aria-hidden="false">
                <button class="tts-btn" id="ttsBtn" title="Nghe phát âm"><span
                        class="icon">🔊</span><span>Nghe</span></button>
                <label>
                    <input type="checkbox" id="autoplayChk"> <span>Tự động đọc</span>
                </label>
                <div class="audio-rate">
                    <input id="rateRange" type="range" min="0.6" max="1.6" step="0.1" value="1" aria-label="Tốc độ đọc">
                    <div id="rateValue">1.0</div>
                </div>
            </div>
        </div>
        <input type="text" id="answerInput" placeholder="Nhập câu trả lời...">
        <button id="submitBtn">Kiểm tra</button>
        <div class="result" id="result"></div>
        <p id="progress"></p>
    </div>

    <script>
        const words = [
            // ================================== 100 TỪ PHỔ BIẾN TRONG TIẾNG ANH ==================================

            // ===== NHÓM MẠO TỪ (Articles) =====
            { english: "a", vietnamese: ["một (dùng trước danh từ số ít)"], pron: "/ə/" },
            { english: "an", vietnamese: ["một (dùng trước nguyên âm)"], pron: "/æn/" },
            { english: "the", vietnamese: ["cái, người, vật đã xác định"], pron: "/ðə/, /ðiː/" },

            // ===== NHÓM ĐẠI TỪ (Pronouns) =====
            { english: "I", vietnamese: ["tôi"], pron: "/aɪ/" },
            { english: "you", vietnamese: ["bạn"], pron: "/juː/" },
            { english: "he", vietnamese: ["anh ấy"], pron: "/hiː/" },
            { english: "she", vietnamese: ["cô ấy"], pron: "/ʃiː/" },
            { english: "it", vietnamese: ["nó"], pron: "/ɪt/" },
            { english: "we", vietnamese: ["chúng ta"], pron: "/wiː/" },
            { english: "they", vietnamese: ["họ"], pron: "/ðeɪ/" },
            { english: "my", vietnamese: ["của tôi"], pron: "/maɪ/" },
            { english: "his", vietnamese: ["của anh ấy"], pron: "/hɪz/" },
            { english: "her", vietnamese: ["của cô ấy"], pron: "/hɜːr/" },
            { english: "their", vietnamese: ["của họ"], pron: "/ðeə(r)/" },

            // ===== NHÓM ĐỘNG TỪ TO BE =====
            { english: "be", vietnamese: ["là", "thì", "ở"], pron: "/biː/" },
            { english: "is", vietnamese: ["là", "ở (số ít)"], pron: "/ɪz/" },
            { english: "are", vietnamese: ["là", "ở (số nhiều)"], pron: "/ɑːr/" },
            { english: "was", vietnamese: ["đã là"], pron: "/wɒz/" },
            { english: "were", vietnamese: ["đã là (số nhiều)"], pron: "/wɜːr/" },
            { english: "become", vietnamese: ["trở thành"], pron: "/bɪˈkʌm/" },

            // ===== NHÓM TỪ ĐỂ HỎI (WH Questions) =====
            { english: "what", vietnamese: ["cái gì"], pron: "/wɒt/" },
            { english: "who", vietnamese: ["ai"], pron: "/huː/" },
            { english: "where", vietnamese: ["ở đâu"], pron: "/weə(r)/" },
            { english: "when", vietnamese: ["khi nào"], pron: "/wen/" },
            { english: "why", vietnamese: ["tại sao"], pron: "/waɪ/" },
            { english: "how", vietnamese: ["như thế nào"], pron: "/haʊ/" },
            { english: "which", vietnamese: ["cái nào"], pron: "/wɪtʃ/" },

            // ===== NHÓM ĐỘNG TỪ CƠ BẢN =====
            { english: "do", vietnamese: ["làm"], pron: "/duː/" },
            { english: "go", vietnamese: ["đi"], pron: "/ɡəʊ/" },
            { english: "come", vietnamese: ["đến"], pron: "/kʌm/" },
            { english: "have", vietnamese: ["có"], pron: "/hæv/" },
            { english: "take", vietnamese: ["lấy", "mang"], pron: "/teɪk/" },
            { english: "make", vietnamese: ["làm", "tạo ra"], pron: "/meɪk/" },
            { english: "give", vietnamese: ["cho"], pron: "/ɡɪv/" },
            { english: "use", vietnamese: ["sử dụng"], pron: "/juːz/" },
            { english: "find", vietnamese: ["tìm thấy"], pron: "/faɪnd/" },

            // ===== NHÓM ĐỘNG TỪ GIAO TIẾP =====
            { english: "say", vietnamese: ["nói"], pron: "/seɪ/" },
            { english: "tell", vietnamese: ["kể", "nói"], pron: "/tel/" },
            { english: "talk", vietnamese: ["nói chuyện"], pron: "/tɔːk/" },
            { english: "call", vietnamese: ["gọi"], pron: "/kɔːl/" },
            { english: "ask", vietnamese: ["hỏi"], pron: "/ɑːsk/" },
            { english: "write", vietnamese: ["viết"], pron: "/raɪt/" },
            { english: "read", vietnamese: ["đọc"], pron: "/riːd/" },

            // ===== NHÓM ĐỘNG TỪ HÀNH ĐỘNG =====
            { english: "run", vietnamese: ["chạy"], pron: "/rʌn/" },
            { english: "play", vietnamese: ["chơi"], pron: "/pleɪ/" },
            { english: "work", vietnamese: ["làm việc"], pron: "/wɜːk/" },
            { english: "help", vietnamese: ["giúp"], pron: "/help/" },
            { english: "bring", vietnamese: ["mang lại"], pron: "/brɪŋ/" },
            { english: "leave", vietnamese: ["rời đi"], pron: "/liːv/" },
            { english: "put", vietnamese: ["đặt", "để"], pron: "/pʊt/" },
            { english: "keep", vietnamese: ["giữ"], pron: "/kiːp/" },
            { english: "move", vietnamese: ["di chuyển"], pron: "/muːv/" },
            { english: "start", vietnamese: ["bắt đầu"], pron: "/stɑːt/" },
            { english: "begin", vietnamese: ["bắt đầu"], pron: "/bɪˈɡɪn/" },

            // ===== NHÓM ĐỘNG TỪ SUY NGHĨ / CẢM XÚC =====
            { english: "think", vietnamese: ["nghĩ"], pron: "/θɪŋk/" },
            { english: "know", vietnamese: ["biết"], pron: "/nəʊ/" },
            { english: "believe", vietnamese: ["tin"], pron: "/bɪˈliːv/" },
            { english: "feel", vietnamese: ["cảm thấy"], pron: "/fiːl/" },
            { english: "want", vietnamese: ["muốn"], pron: "/wɒnt/" },
            { english: "need", vietnamese: ["cần"], pron: "/niːd/" },
            { english: "mean", vietnamese: ["có nghĩa là"], pron: "/miːn/" },
            { english: "seem", vietnamese: ["có vẻ"], pron: "/siːm/" },

            // ===== NHÓM ĐỘNG TỪ KHÁC =====
            { english: "see", vietnamese: ["nhìn thấy"], pron: "/siː/" },
            { english: "look", vietnamese: ["nhìn"], pron: "/lʊk/" },
            { english: "hear", vietnamese: ["nghe"], pron: "/hɪə(r)/" },
            { english: "try", vietnamese: ["cố gắng"], pron: "/traɪ/" },
            { english: "let", vietnamese: ["cho phép"], pron: "/let/" },
            { english: "happen", vietnamese: ["xảy ra"], pron: "/ˈhæpən/" },
            { english: "turn", vietnamese: ["xoay", "đến lượt"], pron: "/tɜːn/" },
            { english: "show", vietnamese: ["cho thấy"], pron: "/ʃəʊ/" },
            { english: "live", vietnamese: ["sống"], pron: "/lɪv/" },
            { english: "sit", vietnamese: ["ngồi"], pron: "/sɪt/" },
            { english: "stand", vietnamese: ["đứng"], pron: "/stænd/" },
            { english: "lose", vietnamese: ["mất"], pron: "/luːz/" },
            { english: "provide", vietnamese: ["cung cấp"], pron: "/prəˈvaɪd/" },

            // ===== NHÓM GIỚI TỪ =====
            { english: "in", vietnamese: ["trong"], pron: "/ɪn/" },
            { english: "on", vietnamese: ["trên"], pron: "/ɒn/" },
            { english: "at", vietnamese: ["tại"], pron: "/æt/" },
            { english: "from", vietnamese: ["từ"], pron: "/frɒm/" },
            { english: "to", vietnamese: ["đến"], pron: "/tuː/" },
            { english: "with", vietnamese: ["với"], pron: "/wɪð/" },
            { english: "by", vietnamese: ["bởi", "bằng"], pron: "/baɪ/" },
            { english: "into", vietnamese: ["vào trong"], pron: "/ˈɪntəʊ/" },
            { english: "over", vietnamese: ["qua", "trên"], pron: "/ˈəʊvə/" },

            // ===== NHÓM TỪ NỐI =====
            { english: "and", vietnamese: ["và"], pron: "/ænd/" },
            { english: "but", vietnamese: ["nhưng"], pron: "/bʌt/" },
            { english: "or", vietnamese: ["hoặc"], pron: "/ɔːr/" },
            { english: "that", vietnamese: ["rằng", "cái mà"], pron: "/ðæt/" },
            { english: "because", vietnamese: ["bởi vì"], pron: "/bɪˈkɒz/" },
            { english: "so", vietnamese: ["vì vậy"], pron: "/səʊ/" },

            // ===== NHÓM TRỢ ĐỘNG TỪ / TỪ CHỨC NĂNG =====
            { english: "can", vietnamese: ["có thể"], pron: "/kæn/" },
            { english: "will", vietnamese: ["sẽ"], pron: "/wɪl/" },
            { english: "would", vietnamese: ["sẽ", "muốn (lịch sự)"], pron: "/wʊd/" },
            { english: "there", vietnamese: ["có", "ở đó"], pron: "/ðeə(r)/" },
            { english: "also", vietnamese: ["cũng"], pron: "/ˈɔːl.səʊ/" },

            // ===== NHÓM DANH TỪ =====
            { english: "time", vietnamese: ["thời gian"], pron: "/taɪm/" },
            { english: "day", vietnamese: ["ngày"], pron: "/deɪ/" },
            { english: "year", vietnamese: ["năm"], pron: "/jɪə(r)/" },
            { english: "people", vietnamese: ["mọi người"], pron: "/ˈpiːpəl/" },
            { english: "life", vietnamese: ["cuộc sống"], pron: "/laɪf/" },
            { english: "idea", vietnamese: ["ý tưởng"], pron: "/aɪˈdɪə/" },
            { english: "place", vietnamese: ["địa điểm"], pron: "/pleɪs/" },
            { english: "future", vietnamese: ["tương lai"], pron: "/ˈfjuːtʃər/" },
            { english: "company", vietnamese: ["công ty"], pron: "/ˈkʌmpəni/" },
            { english: "pleasure", vietnamese: ["niềm vui"], pron: "/ˈpleʒə(r)/" },
            { english: "way", vietnamese: ["cách thức"], pron: "/weɪ/" },
            { english: "part", vietnamese: ["một phần"], pron: "/pɑːrt/" },

            // ===== NHÓM TÍNH TỪ / LƯỢNG TỪ =====
            { english: "all", vietnamese: ["tất cả"], pron: "/ɔːl/" },
            { english: "many", vietnamese: ["nhiều"], pron: "/ˈmeni/" },
            { english: "few", vietnamese: ["ít"], pron: "/fjuː/" },
            { english: "last", vietnamese: ["cuối cùng", "trước đó"], pron: "/lɑːst/" },
            { english: "long", vietnamese: ["dài"], pron: "/lɒŋ/" },
            { english: "great", vietnamese: ["tuyệt vời", "lớn"], pron: "/ɡreɪt/" },
            { english: "little", vietnamese: ["nhỏ"], pron: "/ˈlɪtl/" },
            { english: "own", vietnamese: ["của riêng"], pron: "/əʊn/" },
            { english: "other", vietnamese: ["khác"], pron: "/ˈʌðə(r)/" },
            { english: "big", vietnamese: ["lớn"], pron: "/bɪɡ/" },
            { english: "different", vietnamese: ["khác biệt"], pron: "/ˈdɪfrənt/" },
            { english: "large", vietnamese: ["rộng lớn"], pron: "/lɑːdʒ/" },
            { english: "early", vietnamese: ["sớm"], pron: "/ˈɜːli/" },
            { english: "important", vietnamese: ["quan trọng"], pron: "/ɪmˈpɔːtənt/" },
            { english: "same", vietnamese: ["giống nhau"], pron: "/seɪm/" },
            { english: "able", vietnamese: ["có khả năng"], pron: "/ˈeɪbl/" },
        ];

        const topicDefinitions = [
            { value: "all", label: "Ôn tất cả", start: 0, count: words.length },
            { value: "articles", label: "Mạo từ & đại từ", start: 0, count: 13 },
            { value: "be", label: "Động từ be", start: 13, count: 6 },
            { value: "questions", label: "Từ để hỏi", start: 19, count: 7 },
            { value: "basicVerbs", label: "Động từ cơ bản", start: 26, count: 9 },
            { value: "communication", label: "Động từ giao tiếp", start: 35, count: 7 },
            { value: "actionVerbs", label: "Động từ hành động", start: 42, count: 11 },
            { value: "thoughts", label: "Động từ suy nghĩ & cảm xúc", start: 53, count: 8 },
            { value: "otherVerbs", label: "Động từ khác", start: 61, count: 13 },
            { value: "prepositions", label: "Giới từ", start: 74, count: 9 },
            { value: "conjunctions", label: "Từ nối", start: 83, count: 6 },
            { value: "functionWords", label: "Trợ động từ & từ chức năng", start: 89, count: 5 },
            { value: "nouns", label: "Danh từ cơ bản", start: 94, count: 12 },
            { value: "adjectives", label: "Tính từ / lượng từ", start: 106, count: 16 }
        ];

        let shuffled = [];
        let index = 0;
        let correct = 0;
        let mode = "EtoV";
        let wrongWords = [];
        let reviewMode = false;
        let selectedTopic = "all";

        const wordDisplay = document.getElementById("wordDisplay");
        const resultDiv = document.getElementById("result");
        const input = document.getElementById("answerInput");
        const questionType = document.getElementById("questionType");
        const progress = document.getElementById("progress");
        const button = document.getElementById("submitBtn");
        const modeSelect = document.getElementById('modeSelect');
        const topicSelect = document.getElementById('topicSelect');
        const topicInfo = document.getElementById('topicInfo');

        function getTopicWords(value) {
            const def = topicDefinitions.find(item => item.value === value);
            if (!def || value === 'all') return [...words];
            return words.slice(def.start, def.start + def.count);
        }

        function populateTopicSelect() {
            topicSelect.innerHTML = topicDefinitions.map(item => `<option value="${item.value}">${item.label}</option>`).join('');
            topicSelect.value = selectedTopic;
            topicInfo.textContent = selectedTopic === 'all'
                ? 'Đang ôn tất cả từ vựng.'
                : `Đang ôn chủ đề: ${topicDefinitions.find(item => item.value === selectedTopic)?.label || ''}`;
        }

        function startSession() {
            const topicWords = getTopicWords(selectedTopic);
            shuffled = [...topicWords].sort(() => Math.random() - 0.5);
            index = 0;
            correct = 0;
            wrongWords = [];
            reviewMode = false;
            input.style.display = '';
            button.style.display = '';
            resultDiv.textContent = '';
            populateTopicSelect();
            newQuestion();
        }

        populateTopicSelect();

        modeSelect.addEventListener('change', () => {
            startSession();
        });

        topicSelect.addEventListener('change', () => {
            selectedTopic = topicSelect.value;
            startSession();
        });

        const ttsBtn = document.getElementById('ttsBtn');
        const pronDiv = document.getElementById('pronunciation');
        const autoplayChk = document.getElementById('autoplayChk');
        const rateRange = document.getElementById('rateRange');
        const rateValue = document.getElementById('rateValue');

        function speak(text) {
            if (!window.speechSynthesis) return;
            try {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                // set language to en-US
                utter.lang = 'en-US';
                // set rate from control if present
                try {
                    const r = rateRange ? parseFloat(rateRange.value) : 1;
                    if (isFinite(r)) utter.rate = r;
                } catch (e) { }

                // try to select a matching voice from available voices
                const voices = window.speechSynthesis.getVoices() || [];
                const match = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en-us')) || voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en'));
                if (match) utter.voice = match;

                window.speechSynthesis.speak(utter);
            } catch (e) {
                console.warn('TTS failed', e);
            }
        }

        ttsBtn.addEventListener('click', () => {
            // speak the English form of current word
            const arr = reviewMode ? wrongWords : shuffled;
            const w = arr[index];
            if (w) speak(w.english);
        });

        // rate UI
        if (rateRange && rateValue) {
            rateValue.textContent = parseFloat(rateRange.value).toFixed(1);
            rateRange.addEventListener('input', () => {
                rateValue.textContent = parseFloat(rateRange.value).toFixed(1);
            });
        }

        // Keyboard shortcut: Ctrl + . (Cmd + . on Mac) triggers TTS for current word
        // Works even while typing; includes a short debounce to avoid repeats while keys are held.
        (function () {
            let ttsShortcutCooldown = false;
            document.addEventListener('keydown', (e) => {
                // require Ctrl (or Cmd on Mac) + Period
                if (!((e.ctrlKey || e.metaKey) && (e.key === '.' || e.code === 'Period'))) return;
                // prevent default browser behavior when possible
                try { e.preventDefault(); } catch (_) { }
                if (ttsShortcutCooldown) return;
                ttsShortcutCooldown = true;
                setTimeout(() => { ttsShortcutCooldown = false; }, 350);
                const arr = reviewMode ? wrongWords : shuffled;
                const w = arr[index];
                if (w) {
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                    speak(w.english);
                }
            });
        })();

        // rate control removed

        // Ensure voices list is loaded for some browsers
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = () => {
                // nothing needed now, speak() will pick a match when available
            };
        }

        function newQuestion() {
            let arr = reviewMode ? wrongWords : shuffled;
            if (index >= arr.length) {
                if (!reviewMode && wrongWords.length > 0) {
                    // Bắt đầu ôn lại các từ sai
                    reviewMode = true;
                    index = 0;
                    resultDiv.innerHTML = "<b>Ôn lại các từ bạn đã trả lời sai!</b>";
                    setTimeout(newQuestion, 1500);
                    return;
                } else if (reviewMode && wrongWords.length > 0) {
                    // Nếu vẫn còn từ sai sau 1 vòng ôn lại, tiếp tục ôn lại nữa
                    index = 0;
                    resultDiv.innerHTML = "<b>Tiếp tục ôn lại các từ bạn còn sai!</b>";
                    setTimeout(newQuestion, 1200);
                    return;
                }
                showFinalResult();
                return;
            }

            const sel = document.getElementById('modeSelect').value;
            if (sel === 'Mixed') {
                mode = Math.random() > 0.5 ? "EtoV" : "VtoE";
            } else {
                mode = sel; // 'EtoV' or 'VtoE'
            }
            const w = arr[index];
            input.value = "";
            resultDiv.textContent = "";
            progress.textContent = `Câu ${index + 1}/${arr.length}` + (reviewMode ? " (Ôn lại)" : "");

            if (mode === "EtoV") {
                questionType.textContent = "Dịch sang tiếng Việt:";
                wordDisplay.textContent = w.english;
                // show pronunciation if available
                pronDiv.textContent = w.pron ? w.pron : '';
                // autoplay if enabled
                if (autoplayChk && autoplayChk.checked) {
                    setTimeout(() => { if (window.speechSynthesis) window.speechSynthesis.cancel(); speak(w.english); }, 220);
                }
            } else {
                questionType.textContent = "Dịch sang tiếng Anh:";
                wordDisplay.textContent = Array.isArray(w.vietnamese) ? w.vietnamese.join(", ") : w.vietnamese;
                pronDiv.textContent = '';
            }
            // ...không còn ví dụ...
        }

        function checkAnswer() {
            let arr = reviewMode ? wrongWords : shuffled;
            const userAnswer = input.value.trim().toLowerCase();
            const w = arr[index];
            let correctAnswers = mode === "EtoV"
                ? (Array.isArray(w.vietnamese) ? w.vietnamese : [w.vietnamese])
                : [w.english];
            correctAnswers = correctAnswers.map(ans => ans.toLowerCase().trim());

            if (correctAnswers.includes(userAnswer)) {
                correct++;
                resultDiv.innerHTML = "<span class='correct'>✅ Chính xác!</span>";
                if (reviewMode) {
                    wrongWords.splice(index, 1);
                    setTimeout(newQuestion, 1200);
                    return;
                }
            } else {
                let showAnswer = mode === "EtoV" ? correctAnswers.join(", ") : w.english;
                resultDiv.innerHTML = `<span class='wrong'>❌ Sai rồi!</span> Đáp án đúng là: <b>${showAnswer}</b>`;
                if (!reviewMode && !wrongWords.includes(w)) {
                    wrongWords.push(w);
                }
            }

            index++;
            setTimeout(newQuestion, 1200);
        }

        function showFinalResult() {
            wordDisplay.textContent = "Hoàn thành!";
            questionType.textContent = "";
            input.style.display = "none";
            button.style.display = "none";
            progress.textContent = "";
            if (wrongWords.length === 0) {
                resultDiv.innerHTML = `<h3>Bạn trả lời đúng ${correct}/${shuffled.length} từ.</h3>🌟 Tuyệt vời! Bạn đã nhớ hết từ vựng!`;
            } else {
                resultDiv.innerHTML = `<h3>Bạn đã hoàn thành! Hãy ôn lại các từ này sau:</h3><ul>` +
                    wrongWords.map(w => `<li>${w.english} - ${w.vietnamese}</li>`).join("") + "</ul>";
            }
        }

        button.addEventListener("click", checkAnswer);
        input.addEventListener("keypress", e => {
            if (e.key === "Enter") checkAnswer();
        });

        startSession();
    </script>

</body>

</html>
