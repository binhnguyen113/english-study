<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện phản xạ từ vựng Anh - Việt</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #dff1ff, #a0c4ff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 70px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            width: 98%;
            max-width: 1000px;
            text-align: center;
            font-size: 2em;
        }

        h1 {
            color: #0077b6;
            font-size: 2.5em;
            margin-bottom: 40px;
        }

        .word {
            font-size: 2em;
            font-weight: bold;
            margin: 30px 0;
            color: #03045e;
        }

        input {
            width: 90%;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid #ccc;
            font-size: 1.2em;
        }

        button {
            margin-top: 30px;
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 15px;
            font-size: 1.2em;
            cursor: pointer;
        }

        button:hover {
            background-color: #023e8a;
        }

        .result {
            margin-top: 30px;
            font-weight: bold;
            font-size: 1.3em;
            font-size: 1.1em;
            margin-top: 20px;
        }

        .correct {
            color: green;
        }

        .wrong {
            color: red;
        }

        /* Controls styling */
        .controls {
            margin-bottom: 18px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }

        .controls label {
            font-size: 0.95em;
            color: #023e8a;
            font-weight: 600;
            padding: 6px 10px;
            background: rgba(2, 62, 138, 0.06);
            border-radius: 8px;
        }

        .controls select {
            -webkit-appearance: none;
            appearance: none;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #cbd6e7;
            background: linear-gradient(180deg, #fff, #f7fbff);
            box-shadow: 0 2px 6px rgba(3, 37, 99, 0.06);
            font-size: 1em;
            min-width: 220px;
            cursor: pointer;
        }

        .controls select:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.12);
            border-color: #0077b6;
        }

        /* TTS button - polished */
        .tts-btn {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(180deg, #0077b6, #00629a);
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 1em;
            font-weight: 600;
            box-shadow: 0 6px 18px rgba(3, 37, 99, 0.12), inset 0 -2px 0 rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        }

        .tts-btn .icon {
            font-size: 1.05em;
        }

        .tts-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(3, 37, 99, 0.14);
        }

        .tts-btn:active {
            transform: translateY(0);
            opacity: 0.95;
        }

        .shortcut-hint {
            font-size: 0.85em;
            color: #055a8c;
            margin-top: 6px;
        }

        /* Pronunciation text styling */
        #pronunciation {
            color: #0b3b66;
            font-weight: 600;
            background: rgba(2, 119, 182, 0.06);
            padding: 6px 10px;
            border-radius: 8px;
            margin-top: 6px;
        }

        /* Word row with TTS controls on the right */
        .word-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .word-block {
            text-align: center;
        }

        .tts-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 12px;
            background: rgba(0, 119, 182, 0.04);
        }

        /* voice select removed */

        /* autoplay and speed */
        input[type="range"]#rateRange {
            width: 120px;
            accent-color: #0077b6;
        }

        input[type="checkbox"]#autoplayChk {
            width: 16px;
            height: 16px;
            accent-color: #0077b6;
        }

        /* rate-control removed */

        @media (max-width: 560px) {
            .tts-btn {
                padding: 10px 14px;
                font-size: 0.95em;
            }

            .controls select {
                min-width: 160px;
            }

            .container {
                padding: 36px;
                font-size: 1.25em;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎯 Luyện phản xạ từ vựng Anh - Việt</h1>
        <p id="questionType">Dịch nghĩa của:</p>
        <div class="controls">
            <label for="modeSelect">Chế độ</label>
            <select id="modeSelect">
                <option value="EtoV">Tiếng Anh → Tiếng Việt</option>
                <option value="VtoE">Tiếng Việt → Tiếng Anh</option>
                <option value="Mixed">Xen lẫn (Random)</option>
            </select>
        </div>
        <div class="word-row">
            <div class="word-block">
                <div class="word" id="wordDisplay"></div>
                <div id="pronunciation" style="font-size:0.8em;color:#444;margin-top:6px;"></div>
            </div>
            <div class="tts-controls" aria-hidden="false">
                <button class="tts-btn" id="ttsBtn" title="Nghe phát âm"><span
                        class="icon">🔊</span><span>Nghe</span></button>
                <div class="shortcut-hint">Phím tắt: Ctrl + .</div>
                <label style="margin-top:8px;display:flex;align-items:center;gap:8px;font-size:0.9em;cursor:pointer;">
                    <input type="checkbox" id="autoplayChk"> <span>Tự động đọc</span>
                </label>
                <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
                    <input id="rateRange" type="range" min="0.6" max="1.6" step="0.1" value="1" aria-label="Tốc độ đọc">
                    <div style="font-size:0.9em;color:#055a8c;min-width:36px;text-align:center;" id="rateValue">1.0
                    </div>
                </div>
            </div>
        </div>
        <input type="text" id="answerInput" placeholder="Nhập câu trả lời...">
        <br>
        <button id="submitBtn">Kiểm tra</button>
        <div class="result" id="result"></div>
        <p id="progress"></p>
    </div>

            { english: "run", vietnamese: ["chạy", "vận hành"], pron: "/rʌn/" },
            { english: "scan", vietnamese: ["quét", "dò tìm"], pron: "/skæn/" },
            { english: "subtract", vietnamese: ["trừ đi"], pron: "/səbˈtrækt/" },
            { english: "tedious", vietnamese: ["tẻ nhạt", "nhàm chán"], pron: "/ˈtiːdiəs/" },
            { english: "verify", vietnamese: ["xác minh", "kiểm tra"], pron: "/ˈverɪfaɪ/" },


        ];

        let shuffled = [...words].sort(() => Math.random() - 0.5);
        let index = 0;
        let correct = 0;
        let mode = Math.random() > 0.5 ? "EtoV" : "VtoE";
        let wrongWords = [];
        let reviewMode = false;

        const wordDisplay = document.getElementById("wordDisplay");
        const resultDiv = document.getElementById("result");
        const input = document.getElementById("answerInput");
        const questionType = document.getElementById("questionType");
        const progress = document.getElementById("progress");
        const button = document.getElementById("submitBtn");
        const modeSelect = document.getElementById('modeSelect');

        // When the user changes the mode, reset the session and start over
        modeSelect.addEventListener('change', () => {
            // reshuffle and reset progress
            shuffled = [...words].sort(() => Math.random() - 0.5);
            index = 0;
            correct = 0;
            wrongWords = [];
            reviewMode = false;
            // ensure inputs/buttons are visible again
            input.style.display = '';
            button.style.display = '';
            resultDiv.textContent = '';
            // brief delay so UI updates before showing first question
            setTimeout(newQuestion, 120);
        });

        const ttsBtn = document.getElementById('ttsBtn');
        const pronDiv = document.getElementById('pronunciation');
        const autoplayChk = document.getElementById('autoplayChk');
        const rateRange = document.getElementById('rateRange');
        const rateValue = document.getElementById('rateValue');

        function speak(text) {
            if (!window.speechSynthesis) return;
            try {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                // set language to en-US
                utter.lang = 'en-US';
                // set rate from control if present
                try {
                    const r = rateRange ? parseFloat(rateRange.value) : 1;
                    if (isFinite(r)) utter.rate = r;
                } catch (e) { }

                // try to select a matching voice from available voices
                const voices = window.speechSynthesis.getVoices() || [];
                const match = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en-us')) || voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en'));
                if (match) utter.voice = match;

                window.speechSynthesis.speak(utter);
            } catch (e) {
                console.warn('TTS failed', e);
            }
        }

        ttsBtn.addEventListener('click', () => {
            // speak the English form of current word
            const arr = reviewMode ? wrongWords : shuffled;
            const w = arr[index];
            if (w) speak(w.english);
        });

        // rate UI
        if (rateRange && rateValue) {
            rateValue.textContent = parseFloat(rateRange.value).toFixed(1);
            rateRange.addEventListener('input', () => {
                rateValue.textContent = parseFloat(rateRange.value).toFixed(1);
            });
        }

        // Keyboard shortcut: Ctrl + . (Cmd + . on Mac) triggers TTS for current word
        // Works even while typing; includes a short debounce to avoid repeats while keys are held.
        (function () {
            let ttsShortcutCooldown = false;
            document.addEventListener('keydown', (e) => {
                // require Ctrl (or Cmd on Mac) + Period
                if (!((e.ctrlKey || e.metaKey) && (e.key === '.' || e.code === 'Period'))) return;
                // prevent default browser behavior when possible
                try { e.preventDefault(); } catch (_) { }
                if (ttsShortcutCooldown) return;
                ttsShortcutCooldown = true;
                setTimeout(() => { ttsShortcutCooldown = false; }, 350);
                const arr = reviewMode ? wrongWords : shuffled;
                const w = arr[index];
                if (w) {
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                    speak(w.english);
                }
            });
        })();

        // rate control removed

        // Ensure voices list is loaded for some browsers
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = () => {
                // nothing needed now, speak() will pick a match when available
            };
        }

        function newQuestion() {
            let arr = reviewMode ? wrongWords : shuffled;
            if (index >= arr.length) {
                if (!reviewMode && wrongWords.length > 0) {
                    // Bắt đầu ôn lại các từ sai
                    reviewMode = true;
                    index = 0;
                    resultDiv.innerHTML = "<b>Ôn lại các từ bạn đã trả lời sai!</b>";
                    setTimeout(newQuestion, 1500);
                    return;
                } else if (reviewMode && wrongWords.length > 0) {
                    // Nếu vẫn còn từ sai sau 1 vòng ôn lại, tiếp tục ôn lại nữa
                    index = 0;
                    resultDiv.innerHTML = "<b>Tiếp tục ôn lại các từ bạn còn sai!</b>";
                    setTimeout(newQuestion, 1200);
                    return;
                }
                showFinalResult();
                return;
            }

            const sel = document.getElementById('modeSelect').value;
            if (sel === 'Mixed') {
                mode = Math.random() > 0.5 ? "EtoV" : "VtoE";
            } else {
                mode = sel; // 'EtoV' or 'VtoE'
            }
            const w = arr[index];
            input.value = "";
            resultDiv.textContent = "";
            progress.textContent = `Câu ${index + 1}/${arr.length}` + (reviewMode ? " (Ôn lại)" : "");

            if (mode === "EtoV") {
                questionType.textContent = "Dịch sang tiếng Việt:";
                wordDisplay.textContent = w.english;
                // show pronunciation if available
                pronDiv.textContent = w.pron ? w.pron : '';
                // autoplay if enabled
                if (autoplayChk && autoplayChk.checked) {
                    setTimeout(() => { if (window.speechSynthesis) window.speechSynthesis.cancel(); speak(w.english); }, 220);
                }
            } else {
                questionType.textContent = "Dịch sang tiếng Anh:";
                wordDisplay.textContent = Array.isArray(w.vietnamese) ? w.vietnamese.join(", ") : w.vietnamese;
                pronDiv.textContent = '';
            }
            // ...không còn ví dụ...
        }

        function checkAnswer() {
            let arr = reviewMode ? wrongWords : shuffled;
            const userAnswer = input.value.trim().toLowerCase();
            const w = arr[index];
            let correctAnswers = mode === "EtoV"
                ? (Array.isArray(w.vietnamese) ? w.vietnamese : [w.vietnamese])
                : [w.english];
            correctAnswers = correctAnswers.map(ans => ans.toLowerCase().trim());

            if (correctAnswers.includes(userAnswer)) {
                correct++;
                resultDiv.innerHTML = "<span class='correct'>✅ Chính xác!</span>";
                if (reviewMode) {
                    wrongWords.splice(index, 1);
                    setTimeout(newQuestion, 1200);
                    return;
                }
            } else {
                let showAnswer = mode === "EtoV" ? correctAnswers.join(", ") : w.english;
                resultDiv.innerHTML = `<span class='wrong'>❌ Sai rồi!</span> Đáp án đúng là: <b>${showAnswer}</b>`;
                if (!reviewMode && !wrongWords.includes(w)) {
                    wrongWords.push(w);
                }
            }

            index++;
            setTimeout(newQuestion, 1200);
        }

        function showFinalResult() {
            wordDisplay.textContent = "Hoàn thành!";
            questionType.textContent = "";
            input.style.display = "none";
            button.style.display = "none";
            progress.textContent = "";
            if (wrongWords.length === 0) {
                resultDiv.innerHTML = `<h3>Bạn trả lời đúng ${correct}/${shuffled.length} từ.</h3>🌟 Tuyệt vời! Bạn đã nhớ hết từ vựng!`;
            } else {
                resultDiv.innerHTML = `<h3>Bạn đã hoàn thành! Hãy ôn lại các từ này sau:</h3><ul>` +
                    wrongWords.map(w => `<li>${w.english} - ${w.vietnamese}</li>`).join("") + "</ul>";
            }
        }

        button.addEventListener("click", checkAnswer);
        input.addEventListener("keypress", e => {
            if (e.key === "Enter") checkAnswer();
        });

        newQuestion();
    </script>

</body>

</html>
